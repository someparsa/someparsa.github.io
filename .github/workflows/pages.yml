name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble Jekyll source
        run: |
          mkdir -p _source
          printf '%s\n' '---' 'layout: default' '---' > _source/index.md
          cat README.md >> _source/index.md
          cp _config.yml _source/
          cp -R doc _source/doc
          cp -R hera_ai _source/hera_ai

      - name: Build root site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_source
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
